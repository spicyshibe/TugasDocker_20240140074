<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login Page</title>
  <style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f0f2f5;
        margin: 0;
    }
        .wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        gap: 40px;
    }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 350px;
        }
        .login-container h2 {
            text-align: center;
            margin-top: 0;
            color: #333;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            border-color: #0d6efd;
            outline: none;
        }
        .btn-login {
            width: 100%;
            padding: 10px;
            background-color: #0d6efd;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            transition: background-color 0.3s;
        }
        .btn-login:hover {
            background-color: #0b5ed7;
        }
        .error-msg {
            color: #842029;
            background-color: #f8d7da;
            border: 1px solid #f5c2c7;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 14px;
            text-align: center;
        }

        .foto-box {
            width: 300px;
            padding: 20px;
            background: white;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .foto-box img {
            width: 100%;
            height: auto;
            border-radius: 8px;
        }
  </style>
</head>
<body>

<div class="wrapper">
  <div class="login-container">
    <h2>Login Sistem</h2>

    <div th:if="${error}" class="error-msg">
      <span th:text="${error}"></span>
    </div>

    <form action="/login" method="post">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" required placeholder="Masukkan username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="Masukkan password">
      </div>
      <button type="submit" class="btn-login">Login</button>
    </form>
  </div>

  <div class="foto-box">
    <h2>Ini foto saya euy hehe</h2>
    <img src="/gambarku.jpg" alt="waduh kemana hilang nya?">
    <h2>KKHI: Tolong di anu biar apakali ya gitu lah</h2>
  </div>
</div>

</body>
</html>
