<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login Page</title>
</head>
<body style="font-family: sans-serif; margin: 20px;">

<h2>Login Page</h2>

<div th:if="${error}">
  <p style="color: red; font-weight: bold;" th:text="${error}"></p>
</div>

<form action="/login" method="post">
  <div style="margin-bottom: 10px;">
    <label>Username</label><br>
    <input type="text" name="username" required style="padding: 5px; width: 200px;">
  </div>
  <div style="margin-bottom: 15px;">
    <label>Password</label><br>
    <input type="password" name="password" required style="padding: 5px; width: 200px;">
  </div>
  <button type="submit" style="padding: 5px 15px;">Login</button>
</form>

</body>
</html>
